<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>HBnB - Add Review</title>
    <link rel="stylesheet" href="styles.css">
    <link rel="icon" href="icon.png" type="image/png">
</head>
<body>
    <header>
        <img src="logo.png" alt="HBnB Logo" class="logo">
        <nav>
            <a href="index.html" class="login-button">Home</a>
        </nav>
    </header>

    <main>
        <div class="add-review">
            <h2>Add a Review</h2>
            <p style="text-align:center; margin-bottom: 1rem; color: #666;">
                Reviewing: <strong>Cozy Apartment</strong>
            </p>

            <div class="form">
                <form id="review-form">
                    <label for="review">Your Review:</label>
                    <textarea id="review" name="review" placeholder="Share your experience..." required></textarea>

                    <label for="rating">Rating:</label>
                    <select id="rating" name="rating" required>
                        <option value="">Select a rating</option>
                        <option value="1">★ 1 - Poor</option>
                        <option value="2">★★ 2 - Fair</option>
                        <option value="3">★★★ 3 - Good</option>
                        <option value="4">★★★★ 4 - Very Good</option>
                        <option value="5">★★★★★ 5 - Excellent</option>
                    </select>

                    <button type="submit">Submit Review</button>
                </form>
            </div>
        </div>
    </main>

    <footer>
        <p>&copy; 2024 HBnB. All rights reserved.</p>
    </footer>

    <script src="scripts.js"></script>
</body>
</html>
