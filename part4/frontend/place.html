<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>HBnB - Place Details</title>
    <link rel="stylesheet" href="styles.css">
    <link rel="icon" href="icon.png" type="image/png">
</head>

<body>
    <header>
        <img src="logo.png" alt="HBnB Logo" class="logo">
        <nav>
            <a href="index.html" class="login-button">Home</a>
        </nav>
    </header>

    <main>
        <section id="place-details" class="place-details">
            <img src="images/place1.jpg" alt="Place Image">
            <h1 id="place-title">Loading...</h1>

            <div class="place-info">
                <p><strong>Host:</strong> <span id="place-host">Loading...</span></p>
                <p><strong>Price:</strong> $<span id="place-price">0</span> per night</p>
                <p><strong>Location:</strong> <span id="place-location">Dynamic Location</span></p>
            </div>

            <p id="place-description">Description loading...</p>

            <h3>Amenities</h3>
            <div id="amenities-list" class="amenities-list">
            </div>
        </section>

        <section id="reviews">
            <h2>Reviews</h2>
            <div id="reviews-container">
            </div>
        </section>

        <section id="add-review-section" style="display: none;">
            <a href="add_review.html" class="add-review-btn">Add a Review</a>
        </section>
    </main>

    <footer>
        <p>&copy; 2024 HBnB. All rights reserved.</p>
    </footer>

    <script src="scripts.js"></script>
</body>

</html>
