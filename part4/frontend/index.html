<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>HBnB - List of Places</title>
    <link rel="stylesheet" href="styles.css">
    <link rel="icon" href="icon.png" type="image/png">
</head>
<body>
    <header>
        <img src="logo.png" alt="HBnB Logo" class="logo">
        <nav>
            <a href="login.html" class="login-button">Login</a>
        </nav>
    </header>

    <main>
        <section id="filter">
            <label for="price-filter">Max Price:</label>
            <select id="price-filter">
                <option value="all">All</option>
                <option value="50">$50</option>
                <option value="100">$100</option>
                <option value="200">$200</option>
            </select>
        </section>

        <section id="places-list">
            <div class="place-card">
                <img src="images/place1.jpg" alt="Cozy Apartment">
                <h3>Cozy Apartment</h3>
                <p>$80 per night</p>
                <a href="place.html" class="details-button">View Details</a>
            </div>
            <div class="place-card">
                <img src="images/place2.jpg" alt="Beach House">
                <h3>Beach House</h3>
                <p>$150 per night</p>
                <a href="place.html" class="details-button">View Details</a>
            </div>
            <div class="place-card">
                <img src="images/place3.jpg" alt="Mountain Cabin">
                <h3>Mountain Cabin</h3>
                <p>$120 per night</p>
                <a href="place.html" class="details-button">View Details</a>
            </div>
            <div class="place-card">
                <img src="images/place4.jpg" alt="City Loft">
                <h3>City Loft</h3>
                <p>$90 per night</p>
                <a href="place.html" class="details-button">View Details</a>
            </div>
        </section>
    </main>

    <footer>
        <p>&copy; 2024 HBnB. All rights reserved.</p>
    </footer>

    <script src="scripts.js"></script>
</body>
</html>
